<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Icon Library</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f0f'/></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --border: 0.5px solid #e0e0e0;
      --black: #0f0f0f;
      --gray: #888;
      --light-gray: #aaa;
      --bg: #fff;
      --card-bg: #efefef;
      --pill-bg: #f0f0f0;
      --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--black);
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ─────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 56px;
      border-bottom: var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(17px);
      -webkit-backdrop-filter: blur(15px);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--black);
      flex-shrink: 0;
    }

    .logo-icon {
      width: 22px;
      height: 22px;
      background: var(--black);
      border-radius: 5px;
      flex-shrink: 0;
    }

    /* centered search */
    .nav-search {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .search-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1px solid #d0d0d0;
      border-radius: 99px;
      padding: 8px 16px;
      width: 240px;
      cursor: text;
      transition: width 0.2s;
    }

    .search-pill svg { flex-shrink: 0; color: var(--gray); }

    .search-pill input {
      border: none;
      outline: none;
      font-size: 13.5px;
      font-family: var(--font);
      width: 100%;
      background: transparent;
      color: var(--black);
    }

    .search-pill input::placeholder { color: var(--light-gray); }

    /* OS switcher */
    .os-switcher {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .os-btn {
      font-size: 14px;
      font-weight: 400;
      color: var(#888);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
      padding: 0;
      transition: color 0.1s;
    }

    .os-btn.active {
      color: var(--black);
      font-weight: 600;
    }

    .os-btn:hover:not(.active) { color: #555; }

    /* ── SEARCH OVERLAY ──────────────────────────── */
    .search-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 0;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s, visibility 0.15s;
    }

    .search-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .search-modal {
      background: var(--bg);
      border-radius: 18px;
      width: 860px;
      max-width: calc(100vw - 48px);
      margin-top: 60px;
      overflow: hidden;
      transform: translateY(-6px);
      transition: transform 0.15s;
      max-height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
    }

    .search-overlay.open .search-modal {
      transform: translateY(0);
    }

    .search-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: var(--border);
      flex-shrink: 0;
    }

    .search-modal-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--pill-bg);
      border-radius: 99px;
      padding: 9px 16px;
      flex: 1;
      max-width: 340px;
    }

    .search-modal-input-wrap svg { color: var(--gray); flex-shrink: 0; }

    .search-modal-input-wrap input {
      border: none;
      outline: none;
      font-size: 14px;
      font-family: var(--font);
      background: transparent;
      color: var(--black);
      width: 100%;
    }

    .search-modal-input-wrap input::placeholder { color: var(--light-gray); }

    .search-modal-os {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .search-close-btn {
      width: 32px;
      height: 32px;
      border-radius: 99px;
      background: var(--pill-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray);
      transition: background 0.1s;
      margin-left: 16px;
    }

    .search-close-btn:hover { background: #e6e6e6; color: var(--black); }

    .search-modal-body {
      padding: 28px 28px 32px;
      overflow-y: auto;
      flex: 1;
    }

    /* Empty state — browse by category/style */
    .search-browse {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 0;
    }

    .search-browse-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-right: 24px;
    }

    .search-browse-nav-item {
      font-size: 15px;
      font-weight: 500;
      color: var(--light-gray);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 8px;
      transition: all 0.1s;
    }

    .search-browse-nav-item.active {
      background: var(--pill-bg);
      color: var(--black);
      font-weight: 600;
    }

    .search-browse-nav-item:hover:not(.active) { color: #555; }

    .search-browse-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .search-browse-item {
      font-size: 15px;
      color: var(--black);
      cursor: pointer;
      padding: 3px 0;
      font-weight: 500;
      transition: opacity 0.1s;
    }

    .search-browse-item:hover { opacity: 0.6; }

    /* Results state */
    .search-results-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px 16px;
    }

    .search-empty-msg {
      color: var(--light-gray);
      font-size: 14px;
      padding: 40px 0;
      text-align: center;
    }

    /* ── PAGE BODY ───────────────────────────────── */
    .page {
      padding: 32px 40px 60px;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ── FILTERS ─────────────────────────────────── */
    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-dropdown {
      position: relative;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      background: none;
      border: 0.5px solid #d0d0d0;
      border-radius: 99px;
      padding: 7px 14px;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.1s;
      white-space: nowrap;
    }

    .filter-btn:hover { background: var(--pill-bg); }
    .filter-btn.has-selection { border-color: var(--black); }

    .filter-btn svg {
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .filter-btn.open svg { transform: rotate(180deg); }

    .filter-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--bg);
      border: 0.5px solid #e0e0e0;
      border-radius: 14px;
      padding: 8px;
      min-width: 220px;
      z-index: 50;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: none;
    }

    .filter-menu.open { display: block; }

    .filter-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      transition: background 0.1s;
      user-select: none;
    }

    .filter-menu-item:hover { background: var(--pill-bg); }

    .filter-checkbox {
      width: 16px;
      height: 16px;
      border: 1.5px solid #c8c8c8;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
    }

    .filter-menu-item.selected .filter-checkbox {
      background: var(--black);
      border-color: var(--black);
    }

    .filter-menu-item.selected .filter-checkbox::after {
      content: '';
      display: block;
      width: 9px;
      height: 7px;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 9 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3.5L3.5 6L8 1' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/contain no-repeat;
    }

    /* Active filter pills */
    .filter-pills {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--black);
      border: 0.5px solid #d0d0d0;
      border-radius: 99px;
      padding: 6px 12px;
      background: var(--bg);
      cursor: default;
    }

    .filter-pill-remove {
      cursor: pointer;
      display: flex;
      align-items: center;
      opacity: 0.5;
      transition: opacity 0.1s;
    }

    .filter-pill-remove:hover { opacity: 1; }
    /* ── TABS ────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      align-items: baseline;
    }

    .tab {
      font-size: 14px;
      font-weight: 400;
      color: var(--light-gray);
      cursor: pointer;
      padding-bottom: 3px;
      border-bottom: 1.5px solid transparent;
      transition: color 0.12s;
      user-select: none;
    }

    .tab.active { color: var(--black); font-weight: 600; border-bottom-color: var(--black); }
    .tab:hover:not(.active) { color: #555; }

    /* ── GRID ────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px 16px;
    }

    /* ── CARD ────────────────────────────────────── */
    .card { cursor: pointer; }

    .card-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 26%;
      overflow: hidden;
      background: var(--card-bg);
      margin-bottom: 13px;
      position: relative;
    }

    .card-thumb.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #ebebeb 25%, #e2e2e2 50%, #ebebeb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 2px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge-new {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--black);
      background: var(--bg);
      border: 0.5px solid #c8c8c8;
      padding: 2.5px 9px;
      border-radius: 99px;
    }

    /* ── EMPTY ───────────────────────────────────── */
    .grid-empty {
      grid-column: 1 / -1;
      padding: 80px 24px;
      text-align: center;
      color: var(--light-gray);
      font-size: 14px;
    }

    /* ── MODAL BACKDROP ──────────────────────────── */
    .modal-overlay {
      backdrop-filter: blur(16px);
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.18s, visibility 0.18s;
    }

    .modal-overlay.open { opacity: 1; visibility: visible; }

    /* ── MODAL ───────────────────────────────────── */
    .modal {
      background: var(--bg);
      border-radius: 18px;
      width: 860px;
      max-width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(8px) scale(0.99);
      transition: transform 0.18s;
    }

    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px 0;
    }

    .modal-header-left {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.015em;
    }

    .modal-logo-icon {
      width: 22px;
      height: 22px;
      background: var(--black);
      border-radius: 5px;
      flex-shrink: 0;
    }

    .modal-header-right { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 99px;
      background: var(--pill-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray);
      transition: background 0.1s, color 0.1s;
    }

    .icon-btn:hover { background: #e6e6e6; color: var(--black); }

    .modal-icon-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 48px 28px;
    }

    .modal-icon-wrap {
      width: 340px;
      height: 340px;
      border-radius: 26%;
      overflow: hidden;
      background: var(--card-bg);
    }

    .modal-icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-footer {
      border-top: var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .footer-found {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
    }

    .footer-found-label { font-size: 13.5px; font-weight: 600; white-space: nowrap; }

    .tag {
      font-size: 12.5px;
      font-weight: 400;
      color: var(--black);
      background: var(--pill-bg);
      padding: 5px 12px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .footer-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .footer-btn {
      font-size: 13.5px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 99px;
      border: 0.5px solid #d0d0d0;
      background: var(--bg);
      cursor: pointer;
      font-family: var(--font);
      color: var(--black);
      transition: background 0.1s;
    }

    .footer-btn:hover { background: var(--pill-bg); }

    .footer-more {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--black);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .footer-more:hover { text-decoration: underline; }

    /* ── MOBILE ──────────────────────────────────── */
    .mobile-os-row { display: none; }
    .mobile-filter-row { display: none; }

    @media (max-width: 680px) {
      nav {
        padding: 0 16px;
        height: 52px;
      }

      /* hide centered nav search on mobile, show full-width version */
      .nav-search { display: none; }
      .os-switcher { display: none; }

      /* show mobile logo only (no text) */
      .nav-logo span { display: none; }

      /* full-width search pill replacing centered one */
      .mobile-search-wrap {
        flex: 1;
        margin: 0 12px;
      }

      .mobile-search-pill {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--pill-bg);
        border-radius: 99px;
        padding: 8px 14px;
        width: 100%;
        cursor: text;
      }

      .mobile-search-pill svg { flex-shrink: 0; color: var(--gray); }

      .mobile-search-pill input {
        border: none;
        outline: none;
        font-size: 13px;
        font-family: var(--font);
        width: 100%;
        background: transparent;
        color: var(--black);
      }

      .mobile-search-pill input::placeholder { color: var(--light-gray); }

      /* OS row below nav */
      .mobile-os-row {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 10px 16px;
        border-bottom: var(--border);
      }

      .page {
        padding: 16px 16px 60px;
      }

      /* hide desktop filters, show mobile filter row */
      .filters { display: none; }

      .mobile-filter-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .mobile-count {
        font-size: 13px;
        color: var(--light-gray);
      }

      .mobile-filter-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 500;
        color: var(--black);
        background: none;
        border: none;
        cursor: pointer;
        font-family: var(--font);
        padding: 0;
      }

      /* single column grid on mobile */
      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .card-thumb {
        width: 72px;
        height: 72px;
        flex-shrink: 0;
        margin-bottom: 0;
      }

      .card-meta { flex: 1; }

      /* modal full screen on mobile */
      .modal-overlay { padding: 0; align-items: flex-end; }

      .modal {
        width: 100%;
        border-radius: 18px 18px 0 0;
        max-height: 90vh;
      }

      .modal-icon-wrap { width: 200px; height: 200px; }

      .modal-footer { flex-wrap: wrap; gap: 12px; }

      /* search modal full width on mobile */
      .search-modal {
        width: 100%;
        max-width: 100%;
        margin-top: 0;
        border-radius: 0 0 18px 18px;
      }

      .search-results-grid { grid-template-columns: repeat(2, 1fr); }
    }
    /* OS-specific styles */
    .os-ios .card-thumb     { border-radius: 26%; }
    .os-watchos .card-thumb { border-radius: 50%; }
    .os-visionos .card-thumb{ border-radius: 38%; }

    .os-watchos .card-thumb { border-radius: 26%; }
  </style>
</head>
<body>

<!-- ── NAV ─────────────────────────────────────── -->
<nav>
  <div style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:1200px; margin:0 auto;">
  <a href="/" class="nav-logo" style="text-decoration:none;">
    <div class="logo-icon"></div>
    <span>App Icon Library</span>
  </a>

  <!-- Mobile search (hidden on desktop) -->
  <div class="mobile-search-wrap" style="display:none" id="mobileSearchWrap">
    <div class="mobile-search-pill" id="mobileSearchPill">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="6.5" cy="6.5" r="5.2"/><path d="M11 11l3.2 3.2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="mobileSearchInput" placeholder="Search App Icons" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <!-- Desktop: centered search -->
  <div class="nav-search">
    <div class="search-pill" id="navSearchPill">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="6.5" cy="6.5" r="5.2"/><path d="M11 11l3.2 3.2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search App Icons" autocomplete="off" spellcheck="false" readonly>
    </div>
  </div>

  <!-- OS switcher (desktop) -->
  <div class="os-switcher">
    <button class="os-btn active" data-os="ios">iOS</button>
    <button class="os-btn" data-os="watchos">Watch OS</button>
    <button class="os-btn" data-os="visionos" style="display:none">Vision OS</button>
  </div>
  </div>
</nav>

<!-- Mobile OS row -->
<div class="mobile-os-row" id="mobileOsRow">
  <button class="os-btn active" data-os="ios">iOS</button>
  <button class="os-btn" data-os="watchos">Watch OS</button>
  <button class="os-btn" data-os="visionos" style="display:none">Vision OS</button>
</div>


<!-- ── PAGE ─────────────────────────────────────── -->
<div class="page">

  <!-- Desktop filters -->
  <div class="filters">
    <div class="filter-dropdown" id="catDropdown">
      <button class="filter-btn" id="catBtn" onclick="toggleDropdown('cat')">
        Categories
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 4l4 4 4-4"/></svg>
      </button>
      <div class="filter-menu" id="catMenu">
        <div class="filter-menu-item" data-cat="AI" onclick="toggleCat('AI',this)"><div class="filter-checkbox"></div>AI</div>
        <div class="filter-menu-item" data-cat="Travel" onclick="toggleCat('Travel',this)"><div class="filter-checkbox"></div>Travel &amp; transportation</div>
        <div class="filter-menu-item" data-cat="Food & Drink" onclick="toggleCat('Food & Drink',this)"><div class="filter-checkbox"></div>Food &amp; Drink</div>

// ─────────────────────────────────────────────
//  MOBILE DETECTION
// ─────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 680; }

function applyMobileLayout() {
  const mobileWrap = document.getElementById('mobileSearchWrap');
  if (isMobile()) {
    mobileWrap.style.display = 'block';
  } else {
    mobileWrap.style.display = 'none';
  }
  updateMobileCount();
}

window.addEventListener('resize', applyMobileLayout);
applyMobileLayout();

// ─────────────────────────────────────────────
//  FETCH ICON
// ─────────────────────────────────────────────
async function fetchIcon(name) {
  if (name in cache) return cache[name];
  try {
    const r    = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=software&limit=1`);
    const data = await r.json();
    const url  = data.results?.[0]?.artworkUrl512 ?? null;
    cache[name] = url;
    return url;
  } catch {
    cache[name] = null;
    return null;
  }
}

APPS.forEach(a => fetchIcon(a.name));
WATCH_APPS.forEach(a => fetchIcon(a.name));

// ─────────────────────────────────────────────
//  FILTER
// ─────────────────────────────────────────────
function getVisible(query) {
  const source = activeOS === 'watchos' ? WATCH_APPS : activeOS === 'visionos' ? VISION_APPS : APPS;
  let list = source.slice();
  if (selectedCats.size > 0)   list = list.filter(a => selectedCats.has(a.category));
  if (selectedStyles.size > 0) list = list.filter(a => a.tags.some(t => selectedStyles.has(t)));
  const q = (query || searchQuery || '').toLowerCase();
  if (q) list = list.filter(a => a.name.toLowerCase().includes(q));
  if (activeTab === 'popular') {
    list.sort((a, b) => b.popularity - a.popularity);
  } else {
    list.sort((a, b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0));
  }
  return list;
}

// ─────────────────────────────────────────────
//  RENDER GRID
// ─────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  const apps = getVisible();
  grid.innerHTML = '';
  grid.className = `grid os-${activeOS}`;
  updateMobileCount(apps.length);

  if (!apps.length) {
    grid.innerHTML = '<div class="grid-empty">No apps match your filters.</div>';
    return;
  }

  apps.forEach(app => {
    const safeId = `thumb-${app.name.replace(/[^a-z0-9]/gi, '_')}`;
    const card   = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-thumb loading" id="${safeId}"></div>
      <div class="card-meta">
        <span class="card-name">${app.name}</span>
        ${app.isNew ? '<span class="badge-new">New</span>' : ''}
      </div>`;
    card.addEventListener('click', () => openModal(app));
    grid.appendChild(card);

    const thumbEl = () => document.getElementById(safeId);
    if (app.name in cache) {
      applyThumb(thumbEl(), cache[app.name]);
    } else {
      fetchIcon(app.name).then(url => applyThumb(thumbEl(), url));
    }
  });
}

function applyThumb(el, url) {
  if (!el) return;
  el.classList.remove('loading');
  el.innerHTML = url ? `<img src="${url}" alt="" loading="lazy">` : '';
}

function updateMobileCount(count) {
  const c = count !== undefined ? count : getVisible().length;
  const el = document.getElementById('mobileCount');
  if (el) el.textContent = `${c} app icon${c !== 1 ? 's' : ''}`;
}

// ─────────────────────────────────────────────
//  SEARCH OVERLAY
// ─────────────────────────────────────────────
function openSearchOverlay() {
  document.getElementById('searchOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('overlaySearchInput').focus(), 50);
}

function closeSearchOverlay() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('overlaySearchInput').value = '';
  showSearchBrowse();
}

function showSearchBrowse() {
  document.getElementById('searchBrowse').style.display = 'grid';
  document.getElementById('searchResults').style.display = 'none';
}

function showSearchResults(q) {
  document.getElementById('searchBrowse').style.display = 'none';
  document.getElementById('searchResults').style.display = 'block';
  const apps = getVisible(q);
  const grid = document.getElementById('searchResultsGrid');
  grid.innerHTML = '';

  if (!apps.length) {
    grid.innerHTML = '<div class="search-empty-msg" style="grid-column:1/-1">No results for "' + q + '"</div>';
    return;
  }

  apps.forEach(app => {
    const safeId = `sthumb-${app.name.replace(/[^a-z0-9]/gi, '_')}`;
    const card   = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-thumb loading" id="${safeId}"></div>
      <div class="card-meta">
        <span class="card-name">${app.name}</span>
        ${app.isNew ? '<span class="badge-new">New</span>' : ''}
      </div>`;
    card.addEventListener('click', () => { closeSearchOverlay(); openModal(app); });
    grid.appendChild(card);

    const thumbEl = () => document.getElementById(safeId);
    if (app.name in cache) {
      applyThumb(thumbEl(), cache[app.name]);
    } else {
      fetchIcon(app.name).then(url => applyThumb(thumbEl(), url));
    }
  });
}

// Browse tab switching
function setBrowseTab(el, tab) {
  document.querySelectorAll('.search-browse-nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  const items = document.getElementById('searchBrowseItems');
  if (tab === 'categories') {
    items.innerHTML = `
      <div class="search-browse-item" onclick="applyBrowseFilter('category','Travel')">Travel &amp; transportation</div>
      <div class="search-browse-item" onclick="applyBrowseFilter('category','Food & Drink')">Food &amp; Drink</div>
      <div class="search-browse-item" onclick="applyBrowseFilter('category','Finance')">Finance</div>
      <div class="search-browse-item" onclick="applyBrowseFilter('category','Education')">Education</div>
      <div class="search-browse-item" onclick="applyBrowseFilter('category','Business')">Business</div>`;
  } else {
    items.innerHTML = `
      <div class="search-browse-item" onclick="applyBrowseFilter('style','Flat')">Flat</div>
      <div class="search-browse-item" onclick="applyBrowseFilter('style','Illustrated')">Illustrated</div>
      <div class="search-browse-item" onclick="applyBrowseFilter('style','3D')">3D</div>
      <div class="search-browse-item" onclick="applyBrowseFilter('style','Typographic')">Typographic</div>
      <div class="search-browse-item" onclick="applyBrowseFilter('style','Gradients')">Gradients</div>`;
  }
}

function applyBrowseFilter(type, value) {
  closeSearchOverlay();
  if (type === 'category') {
    activeCategory = value;
    document.querySelectorAll('#categoryList a').forEach(a => {
      a.classList.toggle('active', a.dataset.value === value);
    });
  } else {
    activeStyle = value;
    document.querySelectorAll('#styleList a').forEach(a => {
      a.classList.toggle('active', a.dataset.value === value);
    });
  }
  renderGrid();
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(app) {
  selectedApp = app;
  document.getElementById('modalTitle').textContent = app.name;
  document.getElementById('modalTags').innerHTML    = app.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('copyBtn').textContent    = 'Copy';

  const img = document.getElementById('modalImg');
  img.src   = cache[app.name] || '';
  if (!(app.name in cache)) {
    fetchIcon(app.name).then(url => { if (url) img.src = url; });
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  selectedApp = null;
}

// ─────────────────────────────────────────────
//  COPY / DOWNLOAD
// ─────────────────────────────────────────────
async function copyAction() {
  if (!selectedApp) return;
  const url = cache[selectedApp.name];
  if (!url) return;
  const btn = document.getElementById('copyBtn');
  btn.textContent = 'Copying...';
  try {
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
    const blob = await fetch(proxyUrl).then(r => r.blob());
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    btn.textContent = 'Copied!';
  } catch {
    try {
      await navigator.clipboard.writeText(url);
      btn.textContent = 'URL copied';
    } catch {
      btn.textContent = 'Failed';
    }
  }
  setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
}

async function downloadAction() {
  if (!selectedApp) return;
  const url = cache[selectedApp.name];
  if (!url) return;
  try {
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
    const blob = await fetch(proxyUrl).then(r => r.blob());
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${selectedApp.name.toLowerCase().replace(/\s+/g, '-')}-icon.png`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  } catch {
    window.open(url, '_blank');
  }
}

// ─────────────────────────────────────────────
//  EVENT WIRING
// ─────────────────────────────────────────────

// Desktop filter lists
// ── NEW FILTER LOGIC ──────────────────────────

function toggleDropdown(type) {
  const menu = document.getElementById(type === 'cat' ? 'catMenu' : 'styleMenu');
  const btn  = document.getElementById(type === 'cat' ? 'catBtn' : 'styleBtn');
  const isOpen = menu.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) {
    menu.classList.add('open');
    btn.classList.add('open');
  }
}

function closeAllDropdowns() {
  document.querySelectorAll('.filter-menu').forEach(m => m.classList.remove('open'));
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('open'));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.filter-dropdown')) closeAllDropdowns();
});

function toggleCat(val, el) {
  el.classList.toggle('selected');
  if (selectedCats.has(val)) selectedCats.delete(val);
  else selectedCats.add(val);
  updateCatBtn();
  renderPills();
  renderGrid();
}

function toggleStyle(val, el) {
  el.classList.toggle('selected');
  if (selectedStyles.has(val)) selectedStyles.delete(val);
  else selectedStyles.add(val);
  updateStyleBtn();
  renderPills();
  renderGrid();
}

function updateCatBtn() {
  const btn = document.getElementById('catBtn');
  btn.classList.toggle('has-selection', selectedCats.size > 0);
}

function updateStyleBtn() {
  const btn = document.getElementById('styleBtn');
  btn.classList.toggle('has-selection', selectedStyles.size > 0);
}

function removeCat(val) {
  selectedCats.delete(val);
  const item = document.querySelector(`[data-cat="${val}"]`);
  if (item) item.classList.remove('selected');
  updateCatBtn();
  renderPills();
  renderGrid();
}

function removeStyle(val) {
  selectedStyles.delete(val);
  const item = document.querySelector(`[data-style="${val}"]`);
  if (item) item.classList.remove('selected');
  updateStyleBtn();
  renderPills();
  renderGrid();
}

function renderPills() {
  const container = document.getElementById('filterPills');
  const catLabels = { 'AI':'AI', 'Travel':'Travel & transportation', 'Food & Drink':'Food & Drink', 'Finance':'Finance', 'Education':'Education', 'Business':'Business' };
  let html = '';
  selectedCats.forEach(v => {
    html += `<div class="filter-pill">${catLabels[v] || v}<span class="filter-pill-remove" onclick="removeCat('${v}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 2l8 8M10 2l-8 8"/></svg></span></div>`;
  });
  selectedStyles.forEach(v => {
    html += `<div class="filter-pill">${v}<span class="filter-pill-remove" onclick="removeStyle('${v}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 2l8 8M10 2l-8 8"/></svg></span></div>`;
  });
  container.innerHTML = html;
}
// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderGrid();
  });
});

// Desktop search pill opens overlay
document.getElementById('navSearchPill').addEventListener('click', openSearchOverlay);
document.getElementById('searchInput').addEventListener('focus', openSearchOverlay);

// Mobile search input — filters main grid directly
let mobileSearchTimer;
document.getElementById('mobileSearchInput').addEventListener('input', e => {
  clearTimeout(mobileSearchTimer);
  mobileSearchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim().toLowerCase();
    renderGrid();
  }, 160);
});

// Overlay search input
let overlayTimer;
document.getElementById('overlaySearchInput').addEventListener('input', e => {
  clearTimeout(overlayTimer);
  const q = e.target.value.trim();
  overlayTimer = setTimeout(() => {
    if (q.length === 0) {
      showSearchBrowse();
    } else {
      showSearchResults(q);
    }
  }, 160);
});

// Close overlay
document.getElementById('searchOverlayClose').addEventListener('click', closeSearchOverlay);
document.getElementById('searchOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('searchOverlay')) closeSearchOverlay();
});

// Modal
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeSearchOverlay();
  }
});

document.getElementById('copyBtn').addEventListener('click', copyAction);
document.getElementById('downloadBtn').addEventListener('click', downloadAction);
document.getElementById('copyLinkBtn').addEventListener('click', () => {
  if (selectedApp) navigator.clipboard.writeText(window.location.href + '#' + selectedApp.name.toLowerCase());
});

document.querySelectorAll('.os-btn[data-os]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeOS = btn.dataset.os;
    document.querySelectorAll('.os-btn[data-os]').forEach(b => {
      b.classList.toggle('active', b.dataset.os === activeOS);
    });
    selectedCats.clear();
    selectedStyles.clear();
    document.querySelectorAll('.filter-menu-item').forEach(i => i.classList.remove('selected'));
    updateCatBtn();
    updateStyleBtn();
    renderPills();
    document.querySelectorAll('#categoryList a').forEach(a => a.classList.toggle('active', a.dataset.value === 'all'));
    document.querySelectorAll('#styleList a').forEach(a => a.classList.toggle('active', a.dataset.value === 'all'));
    renderGrid();
  });
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderGrid();
Promise.allSettled(APPS.map(a => fetchIcon(a.name))).then(() => renderGrid());
</script>
